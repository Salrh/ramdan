<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌙 رمضان كريم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  background: #0a0a1a;
  font-family:'Tajawal',sans-serif;
  overflow:hidden;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}

/* ===== STARS BG ===== */
.stars-bg{
  position:fixed;inset:0;z-index:0;
  background: radial-gradient(ellipse at top, #1a1040 0%, #0a0a1a 60%);
}
.star{
  position:absolute;border-radius:50%;
  background:#fff;
  animation:twinkle linear infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0.2;transform:scale(1);}
  50%{opacity:1;transform:scale(1.4);}
}

/* ===== SCREENS ===== */
.screen{
  position:relative;z-index:10;
  width:100%;max-width:420px;
  min-height:100vh;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px 20px;
  text-align:center;
}
.screen.active{display:flex;}

/* ===== TAP SCREEN ===== */
#tap-screen{}

.tap-title{
  font-size:1.4rem;
  color:#f0c060;
  font-weight:700;
  margin-bottom:8px;
  text-shadow:0 0 20px rgba(240,192,96,0.6);
  animation:glow 2s ease-in-out infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 10px rgba(240,192,96,0.4);}
  to{text-shadow:0 0 30px rgba(240,192,96,0.9),0 0 60px rgba(240,192,96,0.4);}
}

.tap-sub{
  font-size:0.95rem;color:rgba(255,255,255,0.5);
  margin-bottom:40px;
}

/* BIG TAP BUTTON */
.tap-area{
  position:relative;
  width:200px;height:200px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-user-select:none;user-select:none;
  margin:0 auto 36px;
}
.tap-ring{
  position:absolute;inset:0;border-radius:50%;
  border:3px solid rgba(240,192,96,0.3);
  animation:ringPulse 2s ease-in-out infinite;
}
.tap-ring:nth-child(2){animation-delay:0.6s;border-color:rgba(240,192,96,0.2);}
.tap-ring:nth-child(3){animation-delay:1.2s;border-color:rgba(240,192,96,0.1);}
@keyframes ringPulse{
  0%{transform:scale(0.8);opacity:1;}
  100%{transform:scale(1.5);opacity:0;}
}
.tap-circle{
  width:140px;height:140px;border-radius:50%;
  background:linear-gradient(135deg,#2a1060,#1a0840);
  border:3px solid #f0c060;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(240,192,96,0.4),inset 0 0 20px rgba(240,192,96,0.1);
  transition:transform 0.1s,box-shadow 0.1s;
  position:relative;z-index:1;
}
.tap-moon{font-size:3rem;line-height:1;margin-bottom:4px;}
.tap-label{font-size:0.85rem;color:#f0c060;font-weight:700;}

.tap-circle.pressed{
  transform:scale(0.88);
  box-shadow:0 0 15px rgba(240,192,96,0.3),inset 0 0 30px rgba(240,192,96,0.2);
}

/* PROGRESS */
.progress-wrap{width:100%;max-width:280px;margin:0 auto;}
.progress-track{
  background:rgba(255,255,255,0.08);
  border-radius:20px;height:12px;overflow:hidden;
  border:1px solid rgba(240,192,96,0.2);
  margin-bottom:12px;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,#f0c060,#ff9f40,#f0c060);
  background-size:200% 100%;
  border-radius:20px;
  width:0%;
  transition:width 0.3s cubic-bezier(0.34,1.56,0.64,1);
  animation:shimmer 2s linear infinite;
}
@keyframes shimmer{0%{background-position:0%;}100%{background-position:200%;}}

.tap-count{
  font-family:'Amiri',serif;
  font-size:1.1rem;color:#f0c060;
  font-weight:700;
  letter-spacing:1px;
}
.encourage{
  font-size:1rem;color:rgba(255,255,255,0.7);
  margin-top:10px;
  min-height:1.4rem;
  transition:all 0.3s;
}

/* SHAKE ANIMATION */
@keyframes shakeBtn{
  0%,100%{transform:scale(0.88) translateX(0);}
  20%{transform:scale(0.88) translateX(-12px);}
  40%{transform:scale(0.88) translateX(12px);}
  60%{transform:scale(0.88) translateX(-8px);}
  80%{transform:scale(0.88) translateX(8px);}
}
.tap-circle.shaking{
  animation:shakeBtn 0.4s ease;
}

/* RIPPLE */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(240,192,96,0.4);
  transform:scale(0);
  animation:rippleOut 0.6s ease-out forwards;
  pointer-events:none;
}
@keyframes rippleOut{
  to{transform:scale(4);opacity:0;}
}

/* ===== REVEAL SCREEN ===== */
#reveal-screen{
  background:transparent;
}

/* Lanterns */
.lantern{
  position:fixed;font-size:2.2rem;
  animation:lanternSwing ease-in-out infinite alternate;
  filter:drop-shadow(0 4px 12px rgba(240,192,96,0.6));
  z-index:5;
}
@keyframes lanternSwing{
  from{transform:rotate(-12deg);}
  to{transform:rotate(12deg);}
}

/* Big moon */
.big-moon{
  font-size:6rem;
  animation:moonRise 1s cubic-bezier(0.34,1.56,0.64,1) both;
  filter:drop-shadow(0 0 30px rgba(240,192,96,0.8));
  margin-bottom:6px;
}
@keyframes moonRise{
  from{opacity:0;transform:translateY(60px) scale(0.3);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* Stars decoration */
.deco-stars{
  font-size:1.4rem;letter-spacing:8px;
  color:#f0c060;margin-bottom:16px;
  animation:fadeInDelay 0.6s ease 0.5s both;
}
@keyframes fadeInDelay{from{opacity:0;}to{opacity:1;}}

/* Main greeting */
.greeting{
  font-family:'Amiri',serif;
  font-size:2.4rem;
  color:#f0c060;
  text-shadow:0 0 30px rgba(240,192,96,0.8),0 0 60px rgba(240,192,96,0.4);
  line-height:1.4;
  margin-bottom:10px;
  animation:textGlow 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes textGlow{
  from{opacity:0;transform:scale(0.7);}
  to{opacity:1;transform:scale(1);}
}

.sub-greeting{
  font-size:1.1rem;
  color:rgba(255,255,255,0.7);
  margin-bottom:24px;
  animation:fadeInDelay 0.6s ease 0.8s both;
}

/* Student card */
.student-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(240,192,96,0.3);
  border-radius:20px;
  padding:16px 24px;
  margin-bottom:20px;
  backdrop-filter:blur(10px);
  animation:fadeInDelay 0.6s ease 1s both;
  box-shadow:0 0 20px rgba(240,192,96,0.1);
}
.student-name{
  font-family:'Amiri',serif;
  font-size:1.2rem;color:#f0c060;font-weight:700;margin-bottom:6px;
}
.student-class{
  font-size:0.9rem;color:rgba(255,255,255,0.6);
}

/* Ornament */
.ornament{
  font-size:1.8rem;letter-spacing:6px;
  animation:fadeInDelay 0.6s ease 1.2s both;
  margin-bottom:10px;
}

/* Floating gold particles */
.gold-particle{
  position:fixed;pointer-events:none;z-index:3;
  font-size:1rem;
  animation:goldFloat linear infinite;
  opacity:0;
}
@keyframes goldFloat{
  0%{opacity:0;transform:translateY(0) rotate(0deg);}
  10%{opacity:0.8;}
  90%{opacity:0.6;}
  100%{opacity:0;transform:translateY(-100vh) rotate(360deg);}
}
</style>
</head>
<body>

<div class="stars-bg" id="stars-bg"></div>

<!-- TAP SCREEN -->
<div class="screen active" id="tap-screen">
  <div class="tap-title">🌙 بطاقة رمضانية خاصة لك</div>
  <div class="tap-sub">اضغطي الزر لتفتحي مفاجأتك ✨</div>

  <div class="tap-area" id="tap-area">
    <div class="tap-ring"></div>
    <div class="tap-ring"></div>
    <div class="tap-ring"></div>
    <div class="tap-circle" id="tap-circle">
      <div class="tap-moon">🌙</div>
      <div class="tap-label">اضغطي!</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="prog"></div>
    </div>
    <div class="tap-count" id="tap-count">0 / 10</div>
    <div class="encourage" id="encourage">✨ ابدأي الضغط!</div>
  </div>
</div>

<!-- REVEAL SCREEN -->
<div class="screen" id="reveal-screen">
  <!-- Lanterns added by JS -->
  <div class="big-moon">🌙</div>
  <div class="deco-stars">✦ ✦ ✦ ✦ ✦</div>
  <div class="greeting">مبارك عليكم<br>الشهر الكريم</div>
  <div class="sub-greeting">رمضان كريم 🌟</div>
  <div class="student-card">
    <div class="student-name">هتون عبدالله الزهراني</div>
    <div class="student-class">الصف 3/2</div>
  </div>
  <div class="ornament">🕌 ☪️ 🌙</div>
</div>

  var bg = document.getElementById('stars-bg');

    var s=document.createElement('div');

    s.style.cssText='width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;animation-duration:'+(1.5+Math.random()*3)+'s;animation-delay:'+Math.random()*3+'s;';
    bg.appendChild(s);
  }
})();

var audioUnlocked = false;
var audioEl = null;

function setupAudio(){
  try{
    audioEl = new Audio('data:audio/mp4;base64,' + AUDIO_B64);
    audioEl.load();
  }catch(e){}
}

function playAudio(){
  try{
    if(audioEl){
      audioEl.currentTime=0;
      audioEl.play().catch(function(){});
    }
  }catch(e){}
}

// ===== TAP LOGIC =====
var taps=0, maxTaps=10, busy=false;
var msgs=[
  '','✨ هيا!','🌙 أحسنتِ!','⭐ قربتِ!','💫 نصف الطريق!',
  '🌟 رائعة!','✨ تقريباً!','🎊 شوي بس!','💛 قربت جداً!',
  '🌙 ضغطة وحدة بس!','🎉 افتحي!'
];

var circle = document.getElementById('tap-circle');
var prog   = document.getElementById('prog');
var tapCount = document.getElementById('tap-count');
var encourage = document.getElementById('encourage');
var tapArea = document.getElementById('tap-area');

function playTak(){
  try{
    var AC2=new(window.AudioContext||window.webkitAudioContext)();
    var o=AC2.createOscillator();
    var g=AC2.createGain();
    o.connect(g);g.connect(AC2.destination);
    o.type='sine';
    o.frequency.setValueAtTime(180,AC2.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,AC2.currentTime+0.08);
    g.gain.setValueAtTime(0.6,AC2.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC2.currentTime+0.12);
    o.start(AC2.currentTime);
    o.stop(AC2.currentTime+0.12);
  }catch(e){}
}

function doTap(){
  if(taps >= maxTaps) return;
  if(!audioUnlocked){ setupAudio(); audioUnlocked=true; }

  taps++;
  playTak();
  tapCount.textContent = taps + ' / ' + maxTaps;
  prog.style.width = (taps/maxTaps*100) + '%';
  encourage.textContent = msgs[taps] || '';

  // Press animation
  circle.classList.remove('pressed','shaking');
  circle.offsetHeight;
  circle.classList.add('pressed');

  // Shake on every odd tap after 3
  if(taps>2 && taps%2===1){
    setTimeout(function(){
      circle.classList.add('shaking');
      setTimeout(function(){circle.classList.remove('shaking');},400);
    },80);
  }

  // Ripple
  var r=document.createElement('div');
  r.className='ripple';
  r.style.cssText='width:60px;height:60px;left:40px;top:40px;';
  circle.appendChild(r);
  setTimeout(function(){r.remove();},700);

  setTimeout(function(){circle.classList.remove('pressed');},150);

  if(taps>=maxTaps){
    setTimeout(reveal,400);
  }
}

// Touch
tapArea.addEventListener('touchend',function(e){
  e.preventDefault();
  doTap();
},{passive:false});
tapArea.addEventListener('click',function(){doTap();});

// ===== REVEAL =====
function reveal(){
  document.getElementById('tap-screen').classList.remove('active');
  var rs=document.getElementById('reveal-screen');
  rs.classList.add('active');

  // Play audio
  playAudio();

  // Add lanterns
  var positions=[
    {top:'2%',left:'2%',delay:'0s',dur:'2s'},
    {top:'2%',left:'80%',delay:'0.5s',dur:'2.5s'},
    {top:'5%',left:'40%',delay:'0.3s',dur:'1.8s'},
    {top:'3%',left:'20%',delay:'0.8s',dur:'2.2s'},
    {top:'4%',left:'65%',delay:'0.2s',dur:'2.8s'},
  ];
  positions.forEach(function(p){
    var l=document.createElement('div');
    l.className='lantern';
    l.textContent='🪔';
    l.style.cssText='top:'+p.top+';left:'+p.left+';animation-duration:'+p.dur+';animation-delay:'+p.delay+';';
    document.body.appendChild(l);
  });

  // Gold particles
  var golds=['✨','⭐','🌟','💫','🌙','☪️'];
  for(var i=0;i<20;i++){
    (function(idx){
      var g=document.createElement('div');
      g.className='gold-particle';
      g.textContent=golds[Math.floor(Math.random()*golds.length)];
      g.style.cssText='left:'+Math.random()*100+'vw;bottom:-20px;animation-duration:'+(4+Math.random()*6)+'s;animation-delay:'+Math.random()*3+'s;font-size:'+(0.8+Math.random()*1.2)+'rem;';
      document.body.appendChild(g);
    })(i);
  }
}

setupAudio();
</script>
